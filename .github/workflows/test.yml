name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  crypto-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce crypto delegation policy
        run: |
          chmod +x scripts/ci/check_no_local_crypto.sh
          ./scripts/ci/check_no_local_crypto.sh

  test-python:
    runs-on: ubuntu-latest
    needs: [crypto-policy]
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          cd python
          pip install -e ".[dev]"
      - name: Run tests
        run: |
          cd python
          pytest -v
      - name: Smoke install wheel + CLI
        run: |
          cd python
          pip install build
          python -m build
          pip install --force-reinstall dist/*.whl
          python -c "import haisdk; import haisdk.integrations as i; assert hasattr(haisdk, 'HaiClient'); assert callable(i.langgraph_wrap_tool_call)"
          haisdk --help > /dev/null

  test-node:
    runs-on: ubuntu-latest
    needs: [crypto-policy]
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: |
          cd node
          npm ci
      - name: Run tests
        run: |
          cd node
          npm test
      - name: Smoke package install + CLI + import modes
        run: |
          cd node
          npm run smoke:package

  test-go:
    runs-on: ubuntu-latest
    needs: [crypto-policy]
    strategy:
      matrix:
        go-version: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Run tests
        run: |
          cd go
          go test -race -v ./...
