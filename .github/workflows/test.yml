name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  crypto-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce crypto delegation policy
        run: |
          chmod +x scripts/ci/check_no_local_crypto.sh
          ./scripts/ci/check_no_local_crypto.sh

  test-python:
    runs-on: ubuntu-latest
    needs: [crypto-policy]
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          cd python
          pip install -e ".[dev,mcp]"
        timeout-minutes: 5
      - name: Run tests
        run: |
          cd python
          pytest -v --timeout=60
        timeout-minutes: 10
      - name: Smoke import
        run: |
          cd python
          python -c "import haiai; import haiai.integrations as i; assert hasattr(haiai, 'HaiClient'); assert callable(i.langgraph_wrap_tool_call)"

  test-node:
    runs-on: ubuntu-latest
    needs: [crypto-policy]
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: |
          cd node
          npm ci
      - name: Run tests
        run: |
          cd node
          npm test
      - name: Smoke package install + CLI + import modes
        run: |
          cd node
          npm run smoke:package

  test-go:
    runs-on: ubuntu-latest
    needs: [crypto-policy]
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Run tests
        run: |
          cd go
          go test -race -v ./...

  test-rust:
    runs-on: ubuntu-latest
    needs: [crypto-policy]
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        rust-version: ["stable"]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust-version }}
      - name: Run tests
        run: |
          cd rust
          cargo test --workspace
