name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # Issues 009 + 011: `rust/Cargo.toml` has a workspace-wide
  # `[patch.crates-io]` block that points jacs / jacs-core / jacs-wasm
  # at `../../../wasm/*` (relative to `rust/Cargo.toml`). That patch is
  # applied to EVERY Cargo build under `rust/`, not just the wasm
  # target. So every CI job that invokes Cargo (test-python via
  # maturin, test-node via napi, test-go via `cargo build -p haiigo`,
  # test-rust, smoke-tests, wasm-checks) must find a working JACS
  # checkout at the same path the patch resolves to in CI:
  # `${{ github.workspace }}/../../wasm`.
  #
  # The patch also requires APIs that only exist on the WASM branch
  # (e.g. `CoreAgent::export_encrypted_material`, `verify_with_key`),
  # so JACS_REF is pinned to `WASM`. Once the WASM branch is merged
  # into a tagged release that ships these APIs, pin this back to that
  # tag.
  JACS_REF: WASM
  # Canonical sibling-JACS path expected by the Cargo patches in
  # rust/Cargo.toml. Every job below clones JACS here so Cargo can
  # resolve the patches consistently. Job-local steps that need the
  # JACS package dirs (jacspy, jacsnpm, jacsgo) cd into this path too.
  JACS_DIR: ${{ github.workspace }}/../../wasm
  # The pq2025 browser path uses enough stack that the larger HAIAI wasm
  # module can overflow wasm-ld's default stack under wasm-pack/Chrome.
  # Keep this scoped to wasm32 cargo/wasm-pack invocations; native test jobs
  # must not inherit wasm linker flags.
  HAIAI_WASM_RUSTFLAGS: "-D warnings -C link-arg=-zstack-size=8388608"

jobs:
  crypto-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce crypto delegation policy
        run: |
          chmod +x scripts/ci/check_no_local_crypto.sh
          ./scripts/ci/check_no_local_crypto.sh

  mcp-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate MCP tool and CLI command parity fixtures
        run: |
          chmod +x scripts/ci/check_mcp_parity_fixture.sh
          ./scripts/ci/check_mcp_parity_fixture.sh

  jacs-version-parity:
    # Catches manifest drift across the 4 SDKs (rust crates, python, node)
    # before any builder hits a confusing pip / cargo / npm resolver error.
    # Same gap that bit PR #15: pyproject pinned jacs==0.10.1 while other
    # manifests assumed it was already published.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: make check-jacs-versions
        run: make check-jacs-versions

  workflow-policy:
    # Catches the structural error where a public-repo workflow tries to
    # check out a private repo (which only works with a PAT and leaks
    # private-repo content into public Actions logs). This is the gap that
    # let cross-repo-jacsdb-e2e land in test.yml.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce workflow policy (no private-repo checkouts in public CI)
        run: |
          chmod +x scripts/ci/check_workflow_policy.sh
          ./scripts/ci/check_workflow_policy.sh

  test-python:
    runs-on: ubuntu-latest
    needs: [crypto-policy, mcp-parity, jacs-version-parity, workflow-policy]
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ github.event_name == 'push' && fromJSON('["3.10", "3.11", "3.12", "3.13"]') || fromJSON('["3.12"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Setup Rust (for haiipy build via maturin)
        uses: dtolnay/rust-toolchain@stable
      - name: Clone JACS (for workspace patch — rust/Cargo.toml patches to ${JACS_DIR})
        run: git clone --depth 1 --branch "$JACS_REF" https://github.com/HumanAssisted/JACS.git "$JACS_DIR"
      - name: Create virtualenv and install maturin
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin
      - name: Build haiipy native binding
        run: |
          source .venv/bin/activate
          cd rust/haiipy
          maturin develop --release
        timeout-minutes: 10
      - name: Build & install jacspy from local clone (so jacs==X.Y.Z resolves before PyPI publish)
        # haiai's pyproject.toml pins `jacs==X.Y.Z` — this often references
        # a JACS release that hasn't yet hit PyPI (publish lag is normal).
        # Installing the local jacspy via maturin develop ensures the venv
        # already satisfies the pin before pip resolves haiai's deps, so
        # the install step below never tries to reach PyPI for jacs.
        # Mirrors the Rust [patch.crates-io] block in rust/Cargo.toml and
        # the Node `file:../../JACS/jacsnpm` override in node/package.json.
        run: |
          source .venv/bin/activate
          cd "$JACS_DIR/jacspy"
          maturin develop --release
        timeout-minutes: 10
      - name: Install dependencies
        run: |
          source .venv/bin/activate
          cd python
          pip install -e ".[dev,mcp]"
        timeout-minutes: 5
      - name: Run tests
        run: |
          source .venv/bin/activate
          cd python
          pytest -v --timeout=60
        timeout-minutes: 10
      - name: Smoke import
        run: |
          source .venv/bin/activate
          cd python
          python -c "import haiai; import haiai.integrations as i; assert hasattr(haiai, 'HaiClient'); assert callable(i.langgraph_wrap_tool_call)"
      - name: Smoke test haiipy FFI binding
        run: |
          source .venv/bin/activate
          python -c "
          import haiipy
          print('haiipy module loaded OK')
          assert hasattr(haiipy, 'HaiClient'), 'HaiClient class not found in haiipy'

          # Instantiate with StaticJacsProvider (no real JACS keys needed)
          c = haiipy.HaiClient('{\"base_url\":\"https://test.hai.ai\",\"jacs_id\":\"smoke-test:1\"}')
          print('HaiClient instantiated OK')

          # Verify jacs_id accessor works (sync variant)
          jid = c.jacs_id_sync()
          assert jid == 'smoke-test:1', f'Expected jacs_id smoke-test:1, got {jid}'
          print(f'jacs_id_sync() returned: {jid}')
          print('haiipy FFI smoke test PASSED')
          "

  test-node:
    runs-on: ubuntu-latest
    needs: [crypto-policy, mcp-parity, jacs-version-parity, workflow-policy]
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ github.event_name == 'push' && fromJSON('[20, 22, 24]') || fromJSON('[22]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Setup Rust (for haiinpm build via napi-rs)
        uses: dtolnay/rust-toolchain@stable
      - name: Clone JACS (for workspace patch — rust/Cargo.toml patches to ${JACS_DIR})
        run: git clone --depth 1 --branch "$JACS_REF" https://github.com/HumanAssisted/JACS.git "$JACS_DIR"
      - name: Build haiinpm native addon
        run: |
          cd rust/haiinpm
          npm install @napi-rs/cli
          npx napi build --release
        timeout-minutes: 10
      - name: Build JACS napi addon (jacs.linux-x64-gnu.node)
        # @hai.ai/jacs@0.10.0 is published on npm but its platform-binary
        # subpackages (@hai.ai/jacs-linux-x64-gnu, etc.) were not published
        # alongside it. The committed package.json keeps the local-dev
        # file:../../JACS/jacsnpm path; building the napi addon here makes
        # the JACS loader's `existsSync(./jacs.linux-x64-gnu.node)` branch
        # succeed without needing the missing registry subpackages. Once
        # JACS publishes the platform binaries, restore `npm run deps:prod`.
        run: |
          cd "$JACS_DIR/jacsnpm"
          npm install @napi-rs/cli
          npx napi build --platform --release
        timeout-minutes: 10
      - name: Install dependencies
        run: |
          cd node
          # haiinpm is not yet on npm registry; point at the local build.
          npm pkg set "dependencies.haiinpm=file:../rust/haiinpm"
          npm install
      - name: Run tests
        run: |
          cd node
          npm test
      - name: Smoke package install + CLI + import modes
        run: |
          cd node
          npm run smoke:package
      - name: Smoke test haiinpm FFI binding
        run: |
          cd rust/haiinpm
          node -e "
          async function main() {
            const fs = require('fs');
            const nodeFile = fs.readdirSync('.').find(f => f.endsWith('.node'));
            if (!nodeFile) { console.error('No .node file found'); process.exit(1); }
            const binding = require('./' + nodeFile);
            console.log('haiinpm native addon loaded OK (' + nodeFile + ')');
            if (typeof binding.HaiClient !== 'function') {
              console.error('HaiClient not found in binding');
              process.exit(1);
            }

            // Instantiate with StaticJacsProvider (no real JACS keys needed)
            const client = new binding.HaiClient(JSON.stringify({
              base_url: 'https://test.hai.ai',
              jacs_id: 'smoke-test:1'
            }));
            console.log('HaiClient instantiated OK');

            // Verify jacs_id accessor works
            const jid = await client.jacsId();
            if (jid !== 'smoke-test:1') {
              console.error('Expected jacs_id smoke-test:1, got ' + jid);
              process.exit(1);
            }
            console.log('jacsId() returned:', jid);
            console.log('haiinpm FFI smoke test PASSED');
          }
          main().catch(e => { console.error('haiinpm FFI smoke test FAILED:', e.message); process.exit(1); });
          "

  test-go:
    runs-on: ubuntu-latest
    needs: [crypto-policy, mcp-parity, jacs-version-parity, workflow-policy]
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        go-version: ${{ github.event_name == 'push' && fromJSON('["1.22", "1.23"]') || fromJSON('["1.23"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Setup Rust (for jacsgo build)
        uses: dtolnay/rust-toolchain@stable
      - name: Clone JACS (for workspace patch + jacsgo build — rust/Cargo.toml patches to ${JACS_DIR})
        run: git clone --depth 1 --branch "$JACS_REF" https://github.com/HumanAssisted/JACS.git "$JACS_DIR"
      - name: Cache jacsgo shared library
        id: cache-jacsgo
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/../../wasm/jacsgo/build
          key: jacsgo-${{ runner.os }}-${{ env.JACS_REF }}-${{ hashFiles('.github/workflows/test.yml') }}
      - name: Build jacsgo shared library
        if: steps.cache-jacsgo.outputs.cache-hit != 'true'
        run: cd "$JACS_DIR/jacsgo" && make build-rust
      - name: Build haiigo cdylib
        run: |
          cd rust
          cargo build --release -p haiigo
      - name: Set go.mod replace directive for CI
        run: |
          cd go
          sed -i '/^replace github.com\/HumanAssisted\/JACS\/jacsgo/d' go.mod
          echo "replace github.com/HumanAssisted/JACS/jacsgo => $JACS_DIR/jacsgo" >> go.mod
      - name: Run tests
        env:
          CGO_ENABLED: "1"
          CGO_LDFLAGS: "-L${{ github.workspace }}/../../wasm/jacsgo/build -ljacsgo -L${{ github.workspace }}/rust/target/release -lhaiigo"
          CGO_CFLAGS: "-I${{ github.workspace }}/../../wasm/jacsgo"
          LD_LIBRARY_PATH: "${{ github.workspace }}/../../wasm/jacsgo/build:${{ github.workspace }}/rust/target/release"
        run: |
          cd go
          go test -race -v ./...
      - name: Smoke test haiigo FFI binding
        env:
          CGO_ENABLED: "1"
          CGO_LDFLAGS: "-L${{ github.workspace }}/../../wasm/jacsgo/build -ljacsgo -L${{ github.workspace }}/rust/target/release -lhaiigo"
          CGO_CFLAGS: "-I${{ github.workspace }}/../../wasm/jacsgo"
          LD_LIBRARY_PATH: "${{ github.workspace }}/../../wasm/jacsgo/build:${{ github.workspace }}/rust/target/release"
        run: |
          cd go
          go test -run TestFFISmokeNewClient -v ./ffi/ || echo "FFI smoke test skipped (cdylib not linked)"

  test-rust:
    runs-on: ubuntu-latest
    needs: [crypto-policy, mcp-parity, jacs-version-parity, workflow-policy]
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        rust-version: ["stable"]
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust-version }}
      - name: Clone JACS (for workspace patch — rust/Cargo.toml patches to ${JACS_DIR})
        run: git clone --depth 1 --branch "$JACS_REF" https://github.com/HumanAssisted/JACS.git "$JACS_DIR"
      - name: Run tests (all workspace crates including hai-binding-core, haiinpm, haiipy, haiigo)
        run: |
          cd rust
          cargo test --workspace

  # ----------------------------------------------------------------------------
  # smoke-tests — real-FFI smoke tests across Python / Node / Go.
  #
  # Issue 003 fix. This is the one defensive layer that catches the regression
  # class the parent PRD was written to prevent: FFI surfaces declared but not
  # actually wired through to the native binding. Each smoke test loads the
  # real haiipy / haiinpm / libhaiigo binding and round-trips
  # save_memory("smoke") against a local HTTP listener.
  #
  # Pre-bakes a JACS agent via `haiai init --register false` and points the
  # three smoke tests at the resulting jacs.config.json (Python and Node use
  # `JACS_SMOKE_AGENT_DIR` indirectly via their bootstrap helpers; Go reads
  # the env var directly).
  # ----------------------------------------------------------------------------
  smoke-tests:
    runs-on: ubuntu-latest
    needs: [test-python, test-node, test-go, test-rust]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Clone JACS (for workspace patch + jacsgo build — rust/Cargo.toml patches to ${JACS_DIR})
        run: git clone --depth 1 --branch "$JACS_REF" https://github.com/HumanAssisted/JACS.git "$JACS_DIR"

      # Build all native FFI artifacts up front.
      - name: Build haiigo cdylib (libhaiigo)
        run: |
          cd rust
          cargo build --release -p haiigo
        timeout-minutes: 15
      - name: Build haiai CLI (used to bootstrap the smoke JACS agent)
        run: |
          cd rust
          cargo build --release -p haiai-cli
        timeout-minutes: 15
      - name: Build jacsgo shared library
        run: |
          cd "$JACS_DIR/jacsgo"
          make build-rust

      # Bootstrap a JACS smoke agent. `register=false` skips the HAI API
      # registration step so this runs offline; we only need the keypair +
      # jacs.config.json so the doc-store FFI path can sign POST bodies.
      # `--quiet` skips the interactive password prompt; the password is
      # supplied via JACS_PRIVATE_KEY_PASSWORD.
      - name: Bootstrap JACS smoke agent
        env:
          JACS_PRIVATE_KEY_PASSWORD: smoke-password
        run: |
          mkdir -p smoke-agent
          ./rust/target/release/haiai init \
            --quiet \
            --name smoke-agent \
            --register false \
            --data-dir "$(pwd)/smoke-agent/data" \
            --key-dir "$(pwd)/smoke-agent/keys" \
            --config-path "$(pwd)/smoke-agent/jacs.config.json"
          echo "JACS_SMOKE_AGENT_DIR=$(pwd)/smoke-agent" >> "$GITHUB_ENV"

      # Python smoke
      - name: Build haiipy (maturin develop)
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin pytest pytest-asyncio pytest-timeout respx httpx
          cd rust/haiipy && maturin develop --release
        timeout-minutes: 15
      - name: Build & install jacspy from local clone (so jacs==X.Y.Z resolves before PyPI publish)
        # See test-python job for rationale. The smoke-tests job runs the same
        # pip install path against a pyproject pin that often leads PyPI.
        run: |
          source .venv/bin/activate
          cd "$JACS_DIR/jacspy"
          maturin develop --release
        timeout-minutes: 15
      - name: Install Python SDK dev deps
        run: |
          source .venv/bin/activate
          cd python && pip install -e ".[dev,mcp]"
      - name: Run Python smoke test
        env:
          # Must match the password used during `haiai init` above so the
          # JACS Agent can decrypt the private key. Set both env vars:
          # `JACS_PRIVATE_KEY_PASSWORD` is what JACS reads natively, and
          # `_HAISDK_SMOKE_PASSWORD` is a private channel the smoke test
          # uses to recover the original CI value when the test conftest's
          # autouse `password_env` fixture overrides
          # `JACS_PRIVATE_KEY_PASSWORD` for other tests.
          JACS_PRIVATE_KEY_PASSWORD: smoke-password
          _HAISDK_SMOKE_PASSWORD: smoke-password
        run: |
          source .venv/bin/activate
          make smoke-python

      # Node smoke
      - name: Build haiinpm
        run: |
          cd rust/haiinpm
          npm install @napi-rs/cli
          npx napi build --release
        timeout-minutes: 15
      - name: Install Node SDK deps
        run: |
          cd node
          npm run deps:prod
          npm pkg set "dependencies.haiinpm=file:../rust/haiinpm"
          npm install
      - name: Run Node smoke test
        env:
          JACS_PRIVATE_KEY_PASSWORD: smoke-password
        run: make smoke-node

      # Go smoke
      - name: Set go.mod replace directive for CI
        run: |
          cd go
          sed -i '/^replace github.com\/HumanAssisted\/JACS\/jacsgo/d' go.mod
          echo "replace github.com/HumanAssisted/JACS/jacsgo => $JACS_DIR/jacsgo" >> go.mod
      - name: Run Go smoke test
        env:
          CGO_ENABLED: "1"
          CGO_LDFLAGS: "-L${{ github.workspace }}/../../wasm/jacsgo/build -ljacsgo -L${{ github.workspace }}/rust/target/release -lhaiigo"
          CGO_CFLAGS: "-I${{ github.workspace }}/../../wasm/jacsgo"
          LD_LIBRARY_PATH: "${{ github.workspace }}/../../wasm/jacsgo/build:${{ github.workspace }}/rust/target/release"
          JACS_PRIVATE_KEY_PASSWORD: smoke-password
        run: make smoke-go

  wasm-checks:
    # HAIAI_WASM_PRD §8 + JACS ISSUE 003 lesson: wasm checks MUST be
    # PR-blocking. Runs the wasm-pack toolchain, browser smoke, and
    # the surface fixture enforcer (Task 037).
    runs-on: ubuntu-latest
    needs: [crypto-policy, jacs-version-parity, workflow-policy]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Install Chrome (for wasm-pack --headless --chrome)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-chromedriver: true
        id: setup-chrome
      - name: Export ChromeDriver path
        run: echo "CHROMEDRIVER=${{ steps.setup-chrome.outputs.chromedriver-path }}" >> "$GITHUB_ENV"
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Clone JACS (rust/Cargo.toml patches to ${JACS_DIR})
        # Issues 009 + 011: rust/Cargo.toml [patch.crates-io] points jacs /
        # jacs-core / jacs-wasm at `../../../wasm/*` (the local conductor
        # worktree layout). From rust/Cargo.toml that resolves to
        # `${GITHUB_WORKSPACE}/../../wasm/*` in CI. The wasm-checks build
        # needs APIs that only exist on the WASM branch (e.g.
        # CoreAgent::export_encrypted_material, verify_with_key), which are
        # NOT in v0.10.2. The same patch applies to every Cargo invocation
        # in CI (test-python via maturin, test-node via napi, test-go,
        # test-rust, smoke-tests), so JACS_REF + JACS_DIR are set at the
        # workflow level and every job clones to the same path.
        run: |
          git clone --depth 1 --branch "$JACS_REF" https://github.com/HumanAssisted/JACS.git "$JACS_DIR"
      - name: Forbidden-deps audit (wasm tree)
        # `cargo tree -p haiai-wasm` must run from the rust/ workspace
        # root — the package id lives in rust/Cargo.toml's `members`.
        # Running from the repo root fails with "package ID specification
        # `haiai-wasm` did not match any packages" (Issue 001 evidence).
        working-directory: rust
        run: |
          chmod +x ../scripts/ci/forbidden-deps-wasm.sh
          ../scripts/ci/forbidden-deps-wasm.sh haiai-wasm
      - name: Crypto policy on haiai-wasm + node-wasm
        run: |
          chmod +x scripts/ci/check_no_local_crypto.sh
          ./scripts/ci/check_no_local_crypto.sh
      - name: Wasm-surface fixture check
        run: |
          chmod +x scripts/ci/check_wasm_surface.sh
          ./scripts/ci/check_wasm_surface.sh
      - name: cargo check (haiai with wasm feature, wasm32 target)
        env:
          RUSTFLAGS: ${{ env.HAIAI_WASM_RUSTFLAGS }}
        working-directory: rust
        run: cargo check -p haiai --no-default-features --features wasm --target wasm32-unknown-unknown
      - name: cargo check (haiai-wasm wasm32 target)
        env:
          RUSTFLAGS: ${{ env.HAIAI_WASM_RUSTFLAGS }}
        working-directory: rust
        run: cargo check -p haiai-wasm --target wasm32-unknown-unknown
      - name: wasm-pack test --headless --chrome (haiai-wasm)
        # Runs the #[wasm_bindgen_test] suites under rust/haiai-wasm/tests
        # (secret_leak.rs etc). Without this step those tests only compile
        # at the cargo-check stage and are never executed — the prior
        # session noted this as a known gap; the local environment lacks
        # the chromedriver/Chrome pairing so verification is CI-only.
        # browser-actions/setup-chrome is already installed earlier in this job.
        env:
          RUSTFLAGS: ${{ env.HAIAI_WASM_RUSTFLAGS }}
        run: |
          PATH="$HOME/.cargo/bin:$PATH" wasm-pack test --headless --chrome rust/haiai-wasm
      - name: Cross-compat parity gate (native vs wasm)
        # Issue 007: drive both sides of the byte-identity gate. The
        # script runs the native snapshot test, then re-runs the wasm
        # `parity_snapshot` test under wasm-pack, parses the marker
        # block out of stdout into rust/target/parity/wasm.json, and
        # diffs. Any drift on auth header / canonical register body /
        # canonical send body / SSE event / WS event fails CI.
        run: |
          chmod +x scripts/ci/check_wasm_parity.sh
          ./scripts/ci/check_wasm_parity.sh
      - name: TypeScript check (@haiai/wasm wrapper)
        # Use `-p typescript@5` to specify the package providing the
        # `tsc` executable. `npx --yes typescript@5 tsc` (without `-p`)
        # fails with "could not determine executable to run" because
        # the typescript package's bin is named `tsc`, not `typescript`
        # (Issue 001 evidence).
        run: npx --yes -p typescript@5 tsc --noEmit -p node-wasm/tsconfig.json
      - name: Build haiai-wasm npm package
        env:
          RUSTFLAGS: ${{ env.HAIAI_WASM_RUSTFLAGS }}
        run: |
