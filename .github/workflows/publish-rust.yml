name: Publish Rust Crates

on:
  push:
    tags:
      - "rust/v*"

permissions:
  contents: write

jobs:
  verify-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: extract
        run: |
          TAG="${GITHUB_REF#refs/tags/rust/v}"
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Check Cargo.toml versions match tag
        run: |
          TAG_VERSION="${{ steps.extract.outputs.version }}"
          for dir in rust/haiai rust/hai-binding-core rust/hai-mcp rust/haiai-cli; do
            CARGO_VERSION=$(grep '^version = ' $dir/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
            echo "$dir version: $CARGO_VERSION, tag: $TAG_VERSION"
            if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::Version mismatch! $dir/Cargo.toml has $CARGO_VERSION but tag is $TAG_VERSION"
              exit 1
            fi
          done

  publish:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install system dependencies (Linux)
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Remove local dev patches
        run: node -e "const f='rust/Cargo.toml';let t=require('fs').readFileSync(f,'utf8').replace(/\r\n/g,'\n');t=t.replace(/\n*(#[^\n]*\n)*\[patch[\s\S]*$/,'\n');require('fs').writeFileSync(f,t)"

      - name: Publish haiai to crates.io
        working-directory: rust/haiai
        run: |
          cargo publish --no-default-features --features rustls-tls,jacs-crate --token ${{ secrets.CRATES_IO_TOKEN }} 2>&1 | tee /tmp/publish-haiai.log
          STATUS=${PIPESTATUS[0]}
          if [ $STATUS -ne 0 ]; then
            if grep -qE "already uploaded|already exists" /tmp/publish-haiai.log; then
              echo "::warning::haiai already published (skipping)"
            else
              echo "::error::Failed to publish haiai"
              exit 1
            fi
          fi

      - name: Wait for haiai to appear on crates.io
        run: |
          VERSION="${{ needs.verify-version.outputs.version }}"
          echo "Waiting for haiai v${VERSION} on crates.io..."
          for i in $(seq 1 36); do
            if cargo search haiai --limit 1 2>/dev/null | grep -q "\"${VERSION}\""; then
              echo "haiai v${VERSION} found after $((i * 5))s"
              break
            fi
            if [ $i -eq 36 ]; then
              echo "::error::haiai v${VERSION} not found on crates.io after 180s"
              exit 1
            fi
            sleep 5
          done

      - name: Publish hai-binding-core to crates.io
        working-directory: rust/hai-binding-core
        run: |
          cargo publish --token ${{ secrets.CRATES_IO_TOKEN }} 2>&1 | tee /tmp/publish-hai-binding-core.log
          STATUS=${PIPESTATUS[0]}
          if [ $STATUS -ne 0 ]; then
            if grep -qE "already uploaded|already exists" /tmp/publish-hai-binding-core.log; then
              echo "::warning::hai-binding-core already published (skipping)"
            else
              echo "::error::Failed to publish hai-binding-core"
              exit 1
            fi
          fi

      - name: Wait for hai-binding-core to appear on crates.io
        run: |
          VERSION="${{ needs.verify-version.outputs.version }}"
          echo "Waiting for hai-binding-core v${VERSION} on crates.io..."
          for i in $(seq 1 36); do
            if cargo search hai-binding-core --limit 1 2>/dev/null | grep -q "\"${VERSION}\""; then
              echo "hai-binding-core v${VERSION} found after $((i * 5))s"
              break
            fi
            if [ $i -eq 36 ]; then
              echo "::error::hai-binding-core v${VERSION} not found on crates.io after 180s"
              exit 1
            fi
            sleep 5
          done

      - name: Publish hai-mcp to crates.io
        working-directory: rust/hai-mcp
        run: |
          cargo publish --token ${{ secrets.CRATES_IO_TOKEN }} 2>&1 | tee /tmp/publish-hai-mcp.log
          STATUS=${PIPESTATUS[0]}
          if [ $STATUS -ne 0 ]; then
            if grep -qE "already uploaded|already exists" /tmp/publish-hai-mcp.log; then
              echo "::warning::hai-mcp already published (skipping)"
            else
              echo "::error::Failed to publish hai-mcp"
              exit 1
            fi
          fi

      - name: Wait for hai-mcp to appear on crates.io
        run: |
          VERSION="${{ needs.verify-version.outputs.version }}"
          echo "Waiting for hai-mcp v${VERSION} on crates.io..."
          for i in $(seq 1 36); do
            if cargo search hai-mcp --limit 1 2>/dev/null | grep -q "\"${VERSION}\""; then
              echo "hai-mcp v${VERSION} found after $((i * 5))s"
              break
            fi
            if [ $i -eq 36 ]; then
              echo "::error::hai-mcp v${VERSION} not found on crates.io after 180s"
              exit 1
            fi
            sleep 5
          done

      - name: Publish haiai-cli to crates.io
        working-directory: rust/haiai-cli
        run: |
          for attempt in 1 2 3; do
            echo "Publish attempt ${attempt}/3..."
            cargo publish --token ${{ secrets.CRATES_IO_TOKEN }} 2>&1 | tee /tmp/publish-cli.log
            STATUS=${PIPESTATUS[0]}
            if [ $STATUS -eq 0 ]; then
              echo "haiai-cli published successfully"
              break
            fi
            if grep -qE "already uploaded|already exists" /tmp/publish-cli.log; then
              echo "::warning::haiai-cli already published (skipping)"
              break
            fi
            if [ $attempt -eq 3 ]; then
              echo "::error::Failed to publish haiai-cli after 3 attempts"
              cat /tmp/publish-cli.log
              exit 1
            fi
            echo "Retrying in 30s..."
            sleep 30
          done

  build:
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_suffix: darwin-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            asset_suffix: darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_suffix: linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_suffix: linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_suffix: windows-x64

    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.verify-version.outputs.version }}
      CLI_ASSET_NAME: haiai-cli-${{ needs.verify-version.outputs.version }}-${{ matrix.asset_suffix }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: rust

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Remove local dev patches
        run: node -e "const f='rust/Cargo.toml';let t=require('fs').readFileSync(f,'utf8').replace(/\r\n/g,'\n');t=t.replace(/\n*(#[^\n]*\n)*\[patch[\s\S]*$/,'\n');require('fs').writeFileSync(f,t)"

      - name: Build CLI binary
        working-directory: rust
        run: cargo build --release -p haiai-cli --target ${{ matrix.target }}

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: ./rust/target/${{ matrix.target }}/release/haiai --version

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\rust\target\${{ matrix.target }}\release\haiai.exe --version

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cp rust/target/${{ matrix.target }}/release/haiai haiai-cli
          tar czf ${CLI_ASSET_NAME}.tar.gz haiai-cli
          shasum -a 256 ${CLI_ASSET_NAME}.tar.gz > ${CLI_ASSET_NAME}.tar.gz.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "rust/target/${{ matrix.target }}/release/haiai.exe" "haiai-cli.exe"
          Compress-Archive -Path "haiai-cli.exe" -DestinationPath "${env:CLI_ASSET_NAME}.zip"
          Get-FileHash "${env:CLI_ASSET_NAME}.zip" -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  ${env:CLI_ASSET_NAME}.zip" } | Out-File "${env:CLI_ASSET_NAME}.zip.sha256" -Encoding ascii

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.asset_suffix }}
          path: |
            ${{ env.CLI_ASSET_NAME }}.*

  release:
    needs: [verify-version, build, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect checksums
        run: |
          cd artifacts
          find . -name "*.sha256" -exec cat {} \; > ../sha256sums.txt
          cd ..
          cat sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rust/v${{ needs.verify-version.outputs.version }}
          name: HAIAI CLI v${{ needs.verify-version.outputs.version }}
          body: |
            ## HAIAI CLI v${{ needs.verify-version.outputs.version }}

            Unified `haiai` binary with CLI + built-in MCP server.

            ### Install

            **From crates.io:**
            ```bash
            cargo install haiai-cli
            ```

            **From prebuilt binary:**
            ```bash
            # macOS (Apple Silicon)
            curl -LO https://github.com/HumanAssisted/haiai/releases/download/rust/v${{ needs.verify-version.outputs.version }}/haiai-cli-${{ needs.verify-version.outputs.version }}-darwin-arm64.tar.gz
            tar xzf haiai-cli-*.tar.gz
            sudo mv haiai-cli /usr/local/bin/haiai

            # Linux (x86_64)
            curl -LO https://github.com/HumanAssisted/haiai/releases/download/rust/v${{ needs.verify-version.outputs.version }}/haiai-cli-${{ needs.verify-version.outputs.version }}-linux-x64.tar.gz
            tar xzf haiai-cli-*.tar.gz
            sudo mv haiai-cli /usr/local/bin/haiai
            ```

            **Start MCP server (stdio):**
            ```bash
            haiai mcp
            ```

            ### Verify checksums
            ```bash
            shasum -a 256 -c sha256sums.txt
            ```
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            sha256sums.txt

  bump-homebrew:
    needs: [verify-version, release]
    runs-on: ubuntu-latest
    steps:
      - name: Download sha256sums from release
        env:
          VERSION: ${{ needs.verify-version.outputs.version }}
        run: |
          curl -fsSL -o sha256sums.txt \
            "https://github.com/HumanAssisted/haiai/releases/download/rust/v${VERSION}/sha256sums.txt"
          cat sha256sums.txt

      - name: Parse per-platform sha256s
        id: sha
        env:
          VERSION: ${{ needs.verify-version.outputs.version }}
        run: |
          pick() { grep "haiai-cli-${VERSION}-$1\\.tar\\.gz\$" sha256sums.txt | awk '{print $1}'; }
          DARWIN_ARM=$(pick darwin-arm64)
          DARWIN_X64=$(pick darwin-x64)
          LINUX_ARM=$(pick linux-arm64)
          LINUX_X64=$(pick linux-x64)
          for name in DARWIN_ARM DARWIN_X64 LINUX_ARM LINUX_X64; do
            val="$(eval echo \$$name)"
            if [ -z "$val" ]; then
              echo "::error::Missing sha256 for $name"
              exit 1
            fi
            echo "$name=$val" >> "$GITHUB_OUTPUT"
          done

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: HumanAssisted/homebrew-haiai
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Regenerate Formula/haiai.rb
        env:
          VERSION:    ${{ needs.verify-version.outputs.version }}
          DARWIN_ARM: ${{ steps.sha.outputs.DARWIN_ARM }}
          DARWIN_X64: ${{ steps.sha.outputs.DARWIN_X64 }}
          LINUX_ARM:  ${{ steps.sha.outputs.LINUX_ARM }}
          LINUX_X64:  ${{ steps.sha.outputs.LINUX_X64 }}
        run: |
          mkdir -p tap/Formula
          cat > tap/Formula/haiai.rb <<EOF
          class Haiai < Formula
            desc "CLI for HAI.AI agent identity, @hai.ai email, and MCP server"
            homepage "https://hai.ai"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/HumanAssisted/haiai/releases/download/rust/v#{version}/haiai-cli-#{version}-darwin-arm64.tar.gz"
                sha256 "${DARWIN_ARM}"
              end
              on_intel do
                url "https://github.com/HumanAssisted/haiai/releases/download/rust/v#{version}/haiai-cli-#{version}-darwin-x64.tar.gz"
                sha256 "${DARWIN_X64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/HumanAssisted/haiai/releases/download/rust/v#{version}/haiai-cli-#{version}-linux-arm64.tar.gz"
                sha256 "${LINUX_ARM}"
              end
              on_intel do
                url "https://github.com/HumanAssisted/haiai/releases/download/rust/v#{version}/haiai-cli-#{version}-linux-x64.tar.gz"
                sha256 "${LINUX_X64}"
              end
            end

            def install
              bin.install "haiai-cli" => "haiai"
            end

            test do
              assert_match "haiai", shell_output("#{bin}/haiai --version")
            end
          end
          EOF

      - name: Commit and push to tap
        working-directory: tap
        env:
          VERSION: ${{ needs.verify-version.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/haiai.rb
          if git diff --cached --quiet; then
            echo "Formula already at v${VERSION} — nothing to push"
            exit 0
          fi
          git commit -m "Bump haiai to ${VERSION}"
          git push origin HEAD:main
