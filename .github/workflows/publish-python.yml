# Publish Python Package
#
# Distribution strategy for haiipy (native FFI binding):
# - maturin builds platform-specific haiipy wheels into python/dist/
# - These wheels are included alongside the haiai sdist/wheels
# - The haiai package optionally imports haiipy at runtime for FFI delegation
# - Users without a haiipy wheel for their platform fall back to the pure-Python
#   HTTP client (httpx) until Issue 001 (full SDK migration) is complete
# - Post Issue 001: haiipy becomes required and wheels must cover all platforms
name: Publish Python Package

on:
  push:
    tags:
      - "python/v*"

permissions:
  contents: read
  id-token: write

jobs:
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version from tag
        id: extract
        run: |
          TAG="${GITHUB_REF#refs/tags/python/v}"
          echo "version=$TAG" >> $GITHUB_OUTPUT

  build-wheels:
    needs: extract-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            wheel_plat: macosx_11_0_arm64
            maturin_target: aarch64-apple-darwin
            os: macos-latest
          - platform: darwin-x64
            wheel_plat: macosx_10_12_x86_64
            maturin_target: x86_64-apple-darwin
            os: macos-14
          - platform: linux-x64
            wheel_plat: manylinux_2_17_x86_64.manylinux2014_x86_64
            maturin_target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - platform: linux-arm64
            wheel_plat: manylinux_2_17_aarch64.manylinux2014_aarch64
            maturin_target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - platform: windows-x64
            wheel_plat: win_amd64
            maturin_target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.maturin_target }}

      - name: Install build tools
        run: pip install build hatchling maturin

      - name: Build haiipy native wheel via maturin
        run: |
          cd rust/haiipy
          maturin build --release --target ${{ matrix.maturin_target }} --out ../../python/dist/
        timeout-minutes: 15

      - name: Download CLI binary from latest Rust release
        run: |
          ASSET="haiai-cli-${VERSION}-${{ matrix.platform }}"
          if [ "${{ matrix.platform }}" = "windows-x64" ]; then
            EXT="zip"
          else
            EXT="tar.gz"
          fi
          URL="https://github.com/HumanAssisted/haiai/releases/download/rust/v${VERSION}/${ASSET}.${EXT}"
          for i in 1 2 3 4 5 6; do
            if curl -fLO "$URL"; then
              echo "Downloaded ${ASSET}.${EXT}"
              exit 0
            fi
            echo "Attempt $i failed, Rust release may still be building. Waiting 60s..."
            sleep 60
          done
          echo "::error::Failed to download $URL after 6 attempts"
          exit 1

      - name: Embed binary into package
        run: |
          cd python
          python scripts/embed_binary.py --platform ${{ matrix.platform }} .. "${VERSION}"

      - name: Update package version
        run: |
          cd python
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml

      - name: Build platform-specific wheel
        run: |
          cd python
          python -m build --wheel

      - name: Rename wheel with platform tag
        run: |
          cd python/dist
          for whl in *.whl; do
            NEW_NAME=$(echo "$whl" | sed "s/py3-none-any/py3-none-${{ matrix.wheel_plat }}/")
            if [ "$NEW_NAME" != "$whl" ]; then
              mv "$whl" "$NEW_NAME"
            fi
          done
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform }}
          path: python/dist/*.whl

  # Also build a pure-Python sdist (no binary — for source installs)
  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build sdist
        run: |
          cd python
          python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python/dist/*.tar.gz

  publish:
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Smoke install wheel (current platform)
        run: |
          pip install dist/haiai-*manylinux*x86_64*.whl || pip install dist/*.tar.gz
          python -c "import haiai; assert hasattr(haiai, 'HaiClient')"
          python -c "from haiai._binary import find_binary; b = find_binary(); print(f'Binary: {b}'); assert b is not None, 'No binary found in wheel'"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
