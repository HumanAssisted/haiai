# Publish Python Package
#
# Distribution strategy:
# - haiipy is published as a separate PyPI package (native PyO3 FFI binding)
# - haiai depends on haiipy and is published after haiipy is available
# - haiai platform wheels embed the CLI binary for each platform
# - Users run `pip install haiai` which pulls in haiipy automatically
name: Publish Python Package

on:
  push:
    tags:
      - "python/v*"

permissions:
  contents: read
  id-token: write

jobs:
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version from tag
        id: extract
        run: |
          TAG="${GITHUB_REF#refs/tags/python/v}"
          echo "version=$TAG" >> $GITHUB_OUTPUT

  # ============================================================
  # Build haiipy native wheels (PyO3 extension) via maturin
  # ============================================================
  build-haiipy-wheels:
    needs: extract-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - maturin_target: aarch64-apple-darwin
            os: macos-latest
          - maturin_target: x86_64-apple-darwin
            os: macos-14
          - maturin_target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - maturin_target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - maturin_target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.maturin_target }}
      - name: Install maturin
        run: pip install maturin
      - name: Build haiipy wheel
        run: |
          cd rust/haiipy
          maturin build --release --target ${{ matrix.maturin_target }} --out dist/
        timeout-minutes: 15
      - uses: actions/upload-artifact@v4
        with:
          name: haiipy-${{ matrix.maturin_target }}
          path: rust/haiipy/dist/*.whl

  # ============================================================
  # Publish haiipy to PyPI (before haiai, since haiai depends on it)
  # ============================================================
  publish-haiipy:
    needs: [extract-version, build-haiipy-wheels]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: haiipy-*
          path: dist
          merge-multiple: true
      - name: List haiipy wheels
        run: ls -la dist/
      - name: Publish haiipy to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
          skip-existing: true

  # ============================================================
  # Build haiai platform wheels (CLI binary + pure Python)
  # ============================================================
  build-haiai-wheels:
    needs: extract-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            wheel_plat: macosx_11_0_arm64
            os: macos-latest
          - platform: darwin-x64
            wheel_plat: macosx_10_12_x86_64
            os: macos-14
          - platform: linux-x64
            wheel_plat: manylinux_2_17_x86_64.manylinux2014_x86_64
            os: ubuntu-latest
          - platform: linux-arm64
            wheel_plat: manylinux_2_17_aarch64.manylinux2014_aarch64
            os: ubuntu-24.04-arm
          - platform: windows-x64
            wheel_plat: win_amd64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build hatchling
      - name: Download CLI binary from latest Rust release
        run: |
          ASSET="haiai-cli-${VERSION}-${{ matrix.platform }}"
          if [ "${{ matrix.platform }}" = "windows-x64" ]; then
            EXT="zip"
          else
            EXT="tar.gz"
          fi
          URL="https://github.com/HumanAssisted/haiai/releases/download/rust/v${VERSION}/${ASSET}.${EXT}"
          for i in $(seq 1 15); do
            if curl -fLO "$URL"; then
              echo "Downloaded ${ASSET}.${EXT}"
              exit 0
            fi
            echo "Attempt $i failed, Rust release may still be building. Waiting 60s..."
            sleep 60
          done
          echo "::error::Failed to download $URL after 15 attempts"
          exit 1
      - name: Embed binary into package
        run: |
          cd python
          python scripts/embed_binary.py --platform ${{ matrix.platform }} .. "${VERSION}"
      - name: Update package version
        run: |
          cd python
          sed -i.bak "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml && rm -f pyproject.toml.bak
      - name: Build platform-specific wheel
        run: |
          cd python
          python -m build --wheel
      - name: Rename wheel with platform tag
        run: |
          cd python/dist
          for whl in *.whl; do
            NEW_NAME=$(echo "$whl" | sed "s/py3-none-any/py3-none-${{ matrix.wheel_plat }}/")
            if [ "$NEW_NAME" != "$whl" ]; then
              mv "$whl" "$NEW_NAME"
            fi
          done
          ls -la
      - uses: actions/upload-artifact@v4
        with:
          name: haiai-wheel-${{ matrix.platform }}
          path: python/dist/*.whl

  # Also build a pure-Python sdist (no binary — for source installs)
  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build sdist
        run: |
          cd python
          python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python/dist/*.tar.gz

  # ============================================================
  # Publish haiai to PyPI (after haiipy is published)
  # ============================================================
  publish-haiai:
    needs: [publish-haiipy, build-haiai-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: haiai-wheel-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: List artifacts
        run: ls -la dist/
      - name: Smoke install wheel (current platform)
        run: |
          pip install dist/haiai-*manylinux*x86_64*.whl || pip install dist/*.tar.gz
          python -c "import haiai; assert hasattr(haiai, 'HaiClient')"
          python -c "from haiai._binary import find_binary; b = find_binary(); print(f'Binary: {b}'); assert b is not None, 'No binary found in wheel'"
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
