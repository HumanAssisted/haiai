# Publish Node Package
#
# Distribution strategy for haiinpm (native FFI binding):
# - The build-native-addon job builds platform-specific .node files for each OS/arch
# - Native addons are uploaded as artifacts and downloaded during publish-haiinpm
# - The haiinpm package is published to npm with all platform .node files bundled
# - The main @haiai/haiai package depends on haiinpm via npm
# - Users import 'haiai' which loads the haiinpm native addon at runtime
# - haiinpm, haiipy, and haiigo are cdylib crates -- they are NOT published to crates.io
# - The haiigo cdylib for Go consumers is distributed via GitHub Release assets
name: Publish Node Package

on:
  push:
    tags:
      - "node/v*"

permissions:
  contents: read
  id-token: write

jobs:
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version from tag
        id: extract
        run: |
          TAG="${GITHUB_REF#refs/tags/node/v}"
          echo "version=$TAG" >> $GITHUB_OUTPUT

  # ============================================================
  # Build CLI platform packages (existing — unchanged)
  # ============================================================
  publish-platform-packages:
    needs: extract-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            npm_pkg: cli-darwin-arm64
          - platform: darwin-x64
            npm_pkg: cli-darwin-x64
          - platform: linux-x64
            npm_pkg: cli-linux-x64
          - platform: linux-arm64
            npm_pkg: cli-linux-arm64
          - platform: windows-x64
            npm_pkg: cli-win32-x64

    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Download CLI binary from latest Rust release
        run: |
          ASSET="haiai-cli-${VERSION}-${{ matrix.platform }}"
          if [ "${{ matrix.platform }}" = "windows-x64" ]; then
            EXT="zip"
          else
            EXT="tar.gz"
          fi
          URL="https://github.com/HumanAssisted/haiai/releases/download/rust/v${VERSION}/${ASSET}.${EXT}"
          for i in 1 2 3 4 5 6; do
            if curl -fLO "$URL"; then
              echo "Downloaded ${ASSET}.${EXT}"
              exit 0
            fi
            echo "Attempt $i failed, Rust release may still be building. Waiting 60s..."
            sleep 60
          done
          echo "::error::Failed to download $URL after 6 attempts"
          exit 1

      - name: Extract binary into platform package
        run: |
          PKG_DIR="node/npm/@haiai/${{ matrix.npm_pkg }}"
          mkdir -p "${PKG_DIR}/bin"
          if [ "${{ matrix.platform }}" = "windows-x64" ]; then
            unzip -o "haiai-cli-${VERSION}-${{ matrix.platform }}.zip" -d /tmp/bin
            cp /tmp/bin/haiai-cli.exe "${PKG_DIR}/bin/haiai.exe" 2>/dev/null || cp /tmp/bin/haiai.exe "${PKG_DIR}/bin/haiai.exe"
          else
            mkdir -p /tmp/bin
            tar xzf "haiai-cli-${VERSION}-${{ matrix.platform }}.tar.gz" -C /tmp/bin
            cp /tmp/bin/haiai-cli "${PKG_DIR}/bin/haiai" 2>/dev/null || cp /tmp/bin/haiai "${PKG_DIR}/bin/haiai"
          fi
          chmod +x "${PKG_DIR}/bin/"*

      - name: Update platform package version
        run: |
          PKG_JSON="node/npm/@haiai/${{ matrix.npm_pkg }}/package.json"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('${PKG_JSON}', 'utf-8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('${PKG_JSON}', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish platform package
        working-directory: node/npm/@haiai/${{ matrix.npm_pkg }}
        run: npm publish --provenance --access public || echo "Already published (safe to ignore)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ============================================================
  # Build haiinpm native addon (.node files) for each platform
  # ============================================================
  build-native-addon:
    needs: extract-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            node_platform: darwin-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            node_platform: darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            node_platform: linux-x64-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            node_platform: win32-x64-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build haiinpm native addon
        run: |
          cd rust/haiinpm
          npm install @napi-rs/cli
          npx napi build --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: haiinpm-${{ matrix.node_platform }}
          path: rust/haiinpm/*.node

  # ============================================================
  # Publish haiinpm package (native addon) to npm
  # ============================================================
  publish-haiinpm:
    needs: [extract-version, build-native-addon]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with:
          pattern: haiinpm-*
          path: node/npm/haiinpm
          merge-multiple: true
      - name: List native addons
        run: ls -la node/npm/haiinpm/
      - name: Update haiinpm version
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('node/npm/haiinpm/package.json', 'utf-8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('node/npm/haiinpm/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      - name: Publish haiinpm
        working-directory: node/npm/haiinpm
        run: npm publish --provenance --access public || echo "Already published (safe to ignore)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ============================================================
  # Publish main @haiai/haiai package
  # ============================================================
  publish:
    needs: [extract-version, publish-platform-packages, publish-haiinpm]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Sync version from git tag
        run: |
          cd node
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf-8'));
            pkg.version = '${VERSION}';
            for (const dep of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[dep] = '${VERSION}';
            }
            if (pkg.dependencies && pkg.dependencies['haiinpm']) {
              pkg.dependencies['haiinpm'] = '${VERSION}';
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      - name: Switch to production dependencies
        run: cd node && npm run deps:prod

      - name: Install dependencies
        run: |
          cd node
          npm install --package-lock-only
          npm ci
      - name: Build
        run: |
          cd node
          npm run build
      - name: Smoke package
        run: |
          cd node
          node ./scripts/smoke-package.cjs
      - name: Publish to npm
        run: |
          cd node
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
