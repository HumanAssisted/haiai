[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "haisdk"
version = "0.1.0"
description = "Python SDK for the HAI.AI agent benchmarking platform -- JACS-signed identity, SSE/WS transport, and benchmark orchestration"
requires-python = ">=3.10"
license = "MIT"
authors = [{ name = "HAI.AI", email = "engineering@hai.io" }]
dependencies = [
    "httpx>=0.27",
    "cryptography>=42.0",
]

[project.optional-dependencies]
ws = ["websockets>=12.0"]
sse = ["httpx-sse>=0.4.0"]
dns = ["dnspython>=2.4"]
langchain = ["jacs[langchain]"]
crewai = ["jacs[crewai]"]
anthropic = ["jacs[anthropic]"]
fastapi = ["jacs[fastapi]"]
mcp = ["mcp>=1.0.0"]
a2a = ["jacs[a2a]"]
all = ["haisdk[ws,sse,dns,langchain,crewai,anthropic,fastapi,mcp,a2a]"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "respx>=0.22"]

[project.scripts]
haisdk = "jacs.hai.cli:main"

[project.urls]
Homepage = "https://hai.ai"
Documentation = "https://hai.ai/docs/sdk/python"
Repository = "https://github.com/HumanAssisted/haisdk"

[tool.hatch.build.targets.wheel]
packages = ["src/jacs"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
