[package]
name = "haiai-cli"
version = "0.1.5"
description = "HAIAI CLI: command-line interface for HAI.AI agent SDK"
readme = "README.md"
keywords = ["hai", "jacs", "agent", "cli", "mcp"]
categories = ["command-line-utilities"]
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true

[[bin]]
name = "haiai"
path = "src/main.rs"

[dependencies]
hai-mcp = { version = "=0.1.5", path = "../hai-mcp" }
haiai = { version = "=0.1.5", path = "../haiai" }
jacs = { version = "=0.9.8", features = ["keychain"] }
jacs-mcp = { version = "=0.9.8", features = ["mcp"] }
anyhow = "1"
rmcp = { version = "0.12", features = ["server", "transport-io", "macros"] }
clap = { version = "4", features = ["derive"] }
tokio.workspace = true
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter"] }
serde_json = "1"
rpassword = "7"
atty = "0.2"

[dev-dependencies]
tempfile = "3"
