# cbindgen configuration for haiigo C FFI header generation.
#
# Run: cd rust && cbindgen --config haiigo/cbindgen.toml --crate haiigo --output haiigo/haiigo.h
#
# This generates a C header file that can be used by external consumers
# or to verify that the inline CGo declarations in go/ffi/ffi.go stay in sync
# with the Rust exports.

language = "C"
header = "/* Generated by cbindgen -- do not edit manually. */"
include_guard = "HAIIGO_H"
line_length = 100

[export]
include = []
exclude = []

[fn]
rename_args = "None"

[enum]
rename_variants = "None"

[parse]
parse_deps = false
